version: 2

project_name: logsage

builds:
  - id: logsage
    main: ./cmd/logsage
    binary: logsage
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.Version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: logsage
    ids:
      - logsage
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    wrap_in_directory: false

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  disable: true
