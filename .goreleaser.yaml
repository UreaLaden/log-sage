version: 2

project_name: logsage

builds:
  - id: logsage
    main: ./cmd/logsage
    binary: logsage
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.Version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: logsage
    ids:
      - logsage
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    wrap_in_directory: false

checksum:
  name_template: checksums.txt
  algorithm: sha256

brews:
  - name: logsage
    ids:
      - logsage
    repository:
      owner: UreaLaden
      name: homebrew-logsage
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/UreaLaden/log-sage"
    description: "AI-powered log analysis CLI that identifies root causes of system failures"
    license: "MIT"
    url_template: "https://github.com/UreaLaden/log-sage/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    test: |
      system "#{bin}/logsage version"
    install: |
      bin.install "logsage"

scoops:
  - name: logsage
    ids:
      - logsage
    repository:
      owner: UreaLaden
      name: scoop-logsage
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: bucket
    homepage: "https://github.com/UreaLaden/log-sage"
    description: "AI-powered log analysis CLI that identifies root causes of system failures"
    license: MIT

changelog:
  disable: true
