name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read       # required for actions/checkout
      pull-requests: write # required for LogSage PR comment posting

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download modules
        run: go mod download

      - name: Run tests with coverage
        # Uses actions-logsage in run: mode — wraps go test, captures output,
        # and posts a LogSage analysis comment on the PR if tests fail.
        # Note: fork PRs receive a ::warning:: instead of a PR comment because
        # GITHUB_TOKEN is read-only for pull_request events from forks.
        # TODO: pin to a release tag once actions-logsage v1 is tagged.
        uses: UreaLaden/actions-logsage@main
        with:
          run: |
            packages="$(go list -f '{{if or .TestGoFiles .XTestGoFiles}}{{.ImportPath}}{{end}}' ./... | sed '/^$/d')"
            go test ${packages} -coverprofile=coverage.out

      - name: Print coverage summary
        shell: bash
        run: |
          go tool cover -func=coverage.out | tee coverage-summary.txt
          {
            echo "## Coverage"
            echo
            echo '```text'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-profile
          path: coverage.out

      - name: Build CLI
        run: go build ./cmd/logsage

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
        with:
          version: v2.11.3
          args: --timeout=5m ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest

    steps:
      - id: govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee
        with:
          go-version-file: go.mod
          go-package: ./...
          output-format: json
