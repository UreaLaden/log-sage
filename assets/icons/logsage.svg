<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LogSage mark">
  <defs>
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(610 510) rotate(180) scale(520 420)">
      <stop offset="0%" stop-color="#131044"></stop>
      <stop offset="55%" stop-color="#09061A"></stop>
      <stop offset="100%" stop-color="#050311"></stop>
    </radialGradient>

    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(608 510) rotate(90) scale(72)">
      <stop offset="0%" stop-color="#FFFFFF"></stop>
      <stop offset="18%" stop-color="#D9D9FF"></stop>
      <stop offset="42%" stop-color="#8E82FF"></stop>
      <stop offset="75%" stop-color="#4D43B8" stop-opacity="0.42"></stop>
      <stop offset="100%" stop-color="#4D43B8" stop-opacity="0"></stop>
    </radialGradient>

    <linearGradient id="dotGrad" x1="240" y1="512" x2="820" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7A74FF"></stop>
      <stop offset="60%" stop-color="#A3A8FF"></stop>
      <stop offset="100%" stop-color="#E8E9FF"></stop>
    </linearGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"></feGaussianBlur>
    </filter>

    <filter id="tinyGlow" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="1.8" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgGlow)"></rect>

  <!-- ambient core -->
  <circle cx="608" cy="510" r="140" fill="url(#coreGlow)"></circle>

  <!-- subtle directional threads -->
  <g stroke="#B8BAFF" stroke-opacity="0.16" stroke-linecap="round">
